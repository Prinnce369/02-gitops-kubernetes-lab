apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitops-kubernetes-lab.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gitops-kubernetes-lab.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gitops-kubernetes-lab.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gitops-kubernetes-lab.name" . }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
